    <style>
        /* Case Cards Styles */
        .case-card {
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-crimson), var(--color-gold));
        }

        .case-card.locked {
            opacity: 0.6;
            pointer-events: none;
        }

        .case-card.locked::before {
            background: var(--color-text-muted);
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-md);
        }

        .case-number {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .case-locked-icon {
            font-size: 1.5rem;
            color: var(--color-text-muted);
        }

        .case-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--color-text-primary);
        }

        .case-teaser {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-md);
            line-height: 1.6;
        }

        .case-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .case-meta-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .case-meta-item i {
            color: var(--color-gold);
        }

        .case-progress {
            margin-bottom: var(--spacing-md);
        }

        .progress-bar {
            height: 4px;
            background: var(--color-slate);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-crimson), var(--color-gold));
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-top: var(--spacing-xs);
        }

        /* Filter Styles */
        .filter-bar {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-2xl);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-dark-gray);
            border: 1px solid var(--color-slate);
            color: var(--color-text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-crimson);
            border-color: var(--color-crimson);
            color: var(--color-text-primary);
        }

        @media (max-width: 768px) {
            .filter-bar {
                justify-content: center;
            }
        }
    </style>
</head>

        // Fetch cases from backend
        async function fetchCases() {
            try {
                const response = await fetch(`${API_BASE}/cases`);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch cases');
                }
                
                const data = await response.json();
                displayCases(data.cases);
            } catch (error) {
                console.error('Error fetching cases:', error);
                // Use mock data if API fails
                displayCases(mockCases);
            }
        }

        // Display cases as cards
        function displayCases(cases) {
            const container = document.getElementById('casesContainer');
            container.innerHTML = '';

            if (!cases || cases.length === 0) {
                container.innerHTML = '<div class="error">No cases available.</div>';
                return;
            }

            cases.forEach(caseItem => {
                const card = document.createElement('div');
                card.className = `card card-premium case-card ${caseItem.locked ? 'locked' : ''}`;
                card.dataset.act = `act-${caseItem.act.toLowerCase()}`;
                card.dataset.difficulty = caseItem.difficulty.toLowerCase();
                
                card.innerHTML = `
                    <div class="case-header">
                        <span class="case-number">${caseItem.number}</span>
                        ${caseItem.locked ? '<i class="fas fa-lock case-locked-icon"></i>' : ''}
                    </div>
                    <h3 class="case-title">${caseItem.title}</h3>
                    <p class="case-teaser">${caseItem.teaser}</p>
                    <div class="case-meta">
                        <div class="case-meta-item">
                            <i class="fas fa-theater-masks"></i>
                            <span>Act ${caseItem.act}</span>
                        </div>
                        <div class="case-meta-item">
                            <i class="fas fa-signal"></i>
                            <span>${caseItem.difficulty}</span>
                        </div>
                        <div class="case-meta-item">
                            <i class="fas fa-clock"></i>
                            <span>${caseItem.estimatedTime}</span>
                        </div>
                    </div>
                    <div class="case-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${caseItem.progress}%"></div>
                        </div>
                        <div class="progress-text">${caseItem.progress}% Complete</div>
                    </div>
                    ${!caseItem.locked ? `
                        <button class="btn btn-primary btn-full" onclick="startCase(${caseItem.id})">
                            ${caseItem.progress > 0 ? 'Continue Investigation' : 'Start Case'}
                        </button>
                    ` : `
                        <button class="btn btn-secondary btn-full" disabled>
                            <i class="fas fa-lock"></i> Locked
                        </button>
                    `}
                `;
                container.appendChild(card);
            });
        }

        // Start a case - store case_id and redirect
        function startCase(caseId) {
            // Store case_id in localStorage
            localStorage.setItem('selected_case_id', caseId);
            
            // Redirect to case-briefing.html
            window.location.href = 'case-briefing.html';
        }

        // Filter functionality
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const caseCards = document.querySelectorAll('.case-card');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active state
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.dataset.filter;

                    caseCards.forEach(card => {
                        if (filter === 'all') {
                            card.style.display = 'block';
                        } else if (filter.startsWith('act-')) {
                            if (card.dataset.act === filter) {
                                card.style.display = 'block';
                            } else {
                                card.style.display = 'none';
                            }
                        } else {
                            if (card.dataset.difficulty === filter) {
                                card.style.display = 'block';
                            } else {
                                card.style.display = 'none';
                            }
                        }
                    });
                });
            });
        }

        // Load cases when page loads
        fetchCases().then(() => {
            setupFilters();
        });
